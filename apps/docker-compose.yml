services:
  db:
    image: postgres:15
    container_name: odoo-db
    restart: unless-stopped
    env_file: .env
    networks:
      - odoo-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:17
    container_name: odoo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    networks:
      - odoo-network
    volumes:
      - odoo-filestore:/var/lib/odoo
    ports:
      - "8069:8069"

  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    restart: unless-stopped
    depends_on:
      - odoo
    networks:
      - odoo-network
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

networks:
  odoo-network:
    driver: bridge

volumes:
  postgres-data:
  odoo-filestore:
